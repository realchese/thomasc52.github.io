baseURL = "https://thomasc52.github.io/"
languageCode = "en-us"
title = "Thomas Chan"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "Essays on culture, politics, and what it means to be human."
  author = "Thomas Chan"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = false
  ShowShareButtons = false
  ShowToc = false
  defaultTheme = "light"
  disableThemeToggle = true

  [params.homeInfoParams]
    Title = "Thomas Chan"
    Content = "Writer. Thinker. UC Berkeley."

  [[params.socialIcons]]
    name = "substack"
    url = "https://thomaschan52.substack.com"

[params.profileMode]
  enabled = false

[menu]
  [[menu.main]]
    identifier = "essays"
    name = "Essays"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
